<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Quiz | AI Study OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm py-4 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="dashboard.html" class="text-xl font-bold text-blue-600 hover:text-blue-700 transition">← Back to Dashboard</a>
            </div>
            <div class="flex space-x-6 text-sm font-medium text-gray-500">
                <span>AI Study OS Practice Mode</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        
        <div class="mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-3xl font-bold text-gray-900">Practice Quiz</h1>
            <p class="text-lg text-gray-600 mt-2">Topic: <span id="quiz-topic" class="font-semibold text-blue-600">Loading...</span></p>
        </div>

        <form id="quiz-submit-form">
            
            <div id="quiz-container" class="space-y-6 mb-8">
                
                <div id="quiz-loader" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-pulse">
                    <div class="h-5 bg-gray-200 rounded w-3/4 mb-6"></div>
                    <div class="space-y-4">
                        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                    </div>
                    <p class="text-center text-sm text-blue-500 mt-6 animate-bounce">AI is crafting your questions...</p>
                </div>
                
                </div>

            <div class="flex justify-end pt-4 mb-10">
                <button type="submit" id="submit-quiz-btn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition duration-200 w-full sm:w-auto">
                    Submit Answers
                </button>
            </div>
        </form>

        <div id="quiz-results" class="hidden mt-4 bg-white p-8 rounded-xl shadow-lg border-2 border-green-400 text-center transform transition-all duration-500 scale-95 opacity-0">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✓</div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Quiz Complete!</h2>
            <p class="text-xl text-gray-600 mb-8">Your Score: <span id="score-display" class="font-extrabold text-blue-600 text-4xl ml-2">0/5</span></p>
            
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="dashboard.html" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-3 px-6 rounded-lg transition duration-200">
                    Return to Dashboard
                </a>
                <a href="chat.html" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium py-3 px-6 rounded-lg transition duration-200 flex items-center justify-center">
                    Review Weak Concepts with AI Tutor 💬
                </a>
            </div>
        </div>

    </main>

    <script src="../static/app.js"></script>
</body>
</html>
