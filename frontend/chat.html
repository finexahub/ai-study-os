<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor | AI Study OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <nav class="bg-white shadow-sm py-3 border-b border-gray-200 shrink-0">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="dashboard.html" class="text-lg font-bold text-gray-600 hover:text-blue-600 transition flex items-center">
                    <span class="mr-2">←</span> Dashboard
                </a>
            </div>
            <div class="flex items-center space-x-2 text-sm font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span>AI Tutor Online</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col max-w-4xl mx-auto w-full bg-white shadow-sm border-x border-gray-100 overflow-hidden relative">
        
        <div id="chat-history" class="flex-grow overflow-y-auto p-4 sm:p-6 space-y-6 bg-gray-50/50">
            
            <div class="flex items-start">
                <div class="flex-shrink-0 mr-3">
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-lg shadow-sm border border-indigo-200">
                        AI
                    </div>
                </div>
                <div class="bg-white border border-gray-100 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] sm:max-w-[75%]">
                    <p class="text-gray-800 leading-relaxed">
                        Hello! I'm your AI Study Coach. Whether you are stuck on a tough physics problem, need a concept explained in simpler terms, or want to review your weak topics, I'm here to help. What are we studying today?
                    </p>
                </div>
            </div>

            </div>

        <div id="typing-indicator" class="hidden absolute bottom-20 left-6">
            <div class="bg-white border border-gray-100 p-3 rounded-2xl rounded-bl-none shadow-sm flex space-x-1.5 items-center w-fit">
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-200 shrink-0">
            <form id="chat-form" class="flex space-x-3">
                <input type="text" id="chat-input" 
                       class="flex-grow bg-gray-50 border border-gray-300 rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
                       placeholder="Ask a question about CBSE Class 10 topics..." required autocomplete="off">
                <button type="submit" id="send-btn" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-3 w-12 h-12 flex items-center justify-center transition shadow-md shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
            <p class="text-center text-xs text-gray-400 mt-2">AI can make mistakes. Verify important facts.</p>
        </div>

    </main>

    <script src="../static/app.js"></script>
</body>
</html>
